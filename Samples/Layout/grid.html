<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Grid Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #333;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: auto auto;
            gap: 15px;
            padding: 20px;
            background-color: #ecf0f1;
        }
        .box {
            background-color: #e74c3c;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
        }
        .header-box {
            grid-column: 1 / span 3;
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Grid Layout</h1>
            <!-- BESONDERHEIT:
                 CSS Grid (display: grid) ist ein 2-dimensionales Layoutsystem.
                 Es erlaubt die Definition von exakten Spalten (grid-template-columns) und Reihen.
                 Elemente können sich über mehrere Spalten erstrecken (grid-column: 1 / span 3).
                 Es ist das mächtigste Werkzeug für die strukturelle Aufteilung einer ganzen Seite. -->
        </header>
        <div class="grid-container">
            <div class="box header-box">Grid Item (span 3 Spalten)</div>
            <div class="box">Grid Item 1 (1fr)</div>
            <div class="box">Grid Item 2 (2fr)</div>
            <div class="box">Grid Item 3 (1fr)</div>
        </div>
    </div>
</body>
</html>
