<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Flexbox Layout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 2px solid #333;
        }
        header {
            background-color: #e67e22;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .flex-container {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: stretch;
            flex-wrap: wrap;
            padding: 20px;
            background-color: #ecf0f1;
            gap: 20px;
        }
        .box {
            flex: 1 1 250px; /* Flexbox behavior with wrap threshold */
            background-color: #34495e;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Flexbox Layout</h1>
            <!-- BESONDERHEIT:
                 Flexbox (display: flex) ist ein 1-dimensionales Layoutmodell.
                 Hier verteilen die Boxen den verfügbaren Platz dynamisch untereinander (mit flex: 1 1 250px).
                 Sie brechen automatisch um (flex-wrap: wrap), sobald der Platz nicht mehr reicht.
                 Ideal für UI-Komponenten und das Ausrichten von Elementen in einer Zeile oder Spalte. -->
        </header>
        <div class="flex-container">
            <div class="box">Flex Item 1 (flex: 1)</div>
            <div class="box">Flex Item 2 (flex: 1)</div>
            <div class="box">Flex Item 3 (flex: 1)</div>
        </div>
    </div>
</body>
</html>
